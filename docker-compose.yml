version: '3.8'

networks:
  app_network: 
    driver: bridge
  

services:

  web:
    restart: unless-stopped
    container_name: web
    build:
      context: ./src
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    environment:
      - PORT=3000
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=linh
      - MYSQL_DATABASE=LINUS_OSS
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./src/logs:/app/logs
      # - ./src:/app/
    networks:
      - app_network
  mysql:
    restart: unless-stopped
    container_name: db
    image: mysql:5.7
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8 --collation-server=utf8_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=linh
      - MYSQL_DATABASE=LINUS_OSS
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - "./SQL:/docker-entrypoint-initdb.d"
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app_network

volumes:
  mysql_data:
